name: Omar Gate

# Senti Pocket Omar Gate - set up the same way as the SentinelLayer org repos:
# the reusable mrrCarter/sentinelayer-v1-action (pinned SHA) runs a real-LLM deep
# scan with codex 5.3 (gpt-5.3-codex) as the managed adjudication model, fail-closed
# (llm_failure_policy: block), P2 severity gate. See docs/OMAR_GATE.md for the
# pending activation steps (secret + billing + branch protection).

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  id-token: write
  pull-requests: write

concurrency:
  group: omar-gate-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  omar_precheck:
    name: Omar Gate Precheck
    runs-on: ubuntu-22.04
    outputs:
      allow_scan: ${{ steps.gate.outputs.allow_scan }}
    permissions:
      contents: read
    steps:
      - id: gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork || false }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "pull_request" ] && [ "${IS_FORK_PR}" = "true" ]; then
            echo "allow_scan=false" >> "${GITHUB_OUTPUT}"
            echo "Skipping privileged Omar scan for forked pull_request events."
            exit 0
          fi
          echo "allow_scan=true" >> "${GITHUB_OUTPUT}"

  omar_gate:
    name: Omar Gate
    needs: [omar_precheck]
    if: needs.omar_precheck.outputs.allow_scan == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Require Omar service token
        shell: bash
        env:
          SENTINELAYER_TOKEN: ${{ secrets.SENTINELAYER_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SENTINELAYER_TOKEN:-}" ]; then
            echo "::error::Missing SENTINELAYER_TOKEN repo secret — Omar Gate cannot authorize the scan. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "::add-mask::${SENTINELAYER_TOKEN}"

      - name: Run managed Omar Gate (codex 5.3, deep, real-LLM, fail-closed)
        id: managed_omar
        uses: mrrCarter/sentinelayer-v1-action@c61fb388e9769449c6cbe0062805d46b484a47ec # full Omar action + managed capacity fallback + public provider-error redaction
        with:
          github_token: ${{ github.token }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          google_api_key: ${{ secrets.GOOGLE_GEMINI_API_KEY || secrets.GOOGLE_API_KEY }}
          llm_provider: openai
          comment_tag: managed
          sentinelayer_token: ${{ secrets.SENTINELAYER_TOKEN }}
          sentinelayer_spec_id: ${{ vars.SENTINELAYER_SPEC_ID || '' }}
          sentinelayer_managed_llm: "true"
          scan_mode: deep
          severity_gate: P2
          model: gpt-5.3-codex
          codex_model: gpt-5.3-codex
          model_fallback: gemini-2.5-flash
          use_codex: "true"
          llm_failure_policy: block

  deterministic_gate:
    name: Deterministic security gate
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install pinned SentinelLayer CLI
        run: npm install --global --ignore-scripts sentinelayer-cli@0.39.2

      - name: Run deterministic Omar Gate
        run: sl /omargate deep --path . --scope-mode full --no-ai --json

  swift_tests:
    name: Swift test (${{ matrix.package }})
    runs-on: macos-15
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        package:
          - PocketContracts
          - PocketBriefing
          - PocketCall
          - PocketInference
          - PocketVoice
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Report Swift toolchain
        run: swift --version

      - name: Detect package on this ref
        id: package
        shell: bash
        run: |
          if [[ -f "packages/${{ matrix.package }}/Package.swift" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve package
        if: steps.package.outputs.exists == 'true'
        run: swift package --package-path "packages/${{ matrix.package }}" resolve

      - name: Build and test package
        if: steps.package.outputs.exists == 'true'
        run: swift test --package-path "packages/${{ matrix.package }}" --parallel

      - name: Report package absent on this ref
        if: steps.package.outputs.exists != 'true'
        run: echo "packages/${{ matrix.package }} is not present on this ref"
