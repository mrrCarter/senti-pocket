name: Omar Gate

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - "atlas/**"
      - "echo/**"
      - "relay/**"
      - "pulse/**"

permissions:
  contents: read

concurrency:
  group: omar-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-gate:
    name: Deterministic security gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install pinned SentinelLayer CLI
        run: npm install --global --ignore-scripts sentinelayer-cli@0.39.2

      - name: Run deterministic Omar Gate
        run: sl /omargate deep --path . --scope-mode full --no-ai --json

  swift-tests:
    name: Swift test (${{ matrix.package }})
    runs-on: macos-15
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        package:
          - PocketContracts
          - PocketBriefing
          - PocketCall
          - PocketInference
          - PocketVoice
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Report Swift toolchain
        run: swift --version

      - name: Detect package on this ref
        id: package
        shell: bash
        run: |
          if [[ -f "packages/${{ matrix.package }}/Package.swift" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve package
        if: steps.package.outputs.exists == 'true'
        run: swift package --package-path "packages/${{ matrix.package }}" resolve

      - name: Build and test package
        if: steps.package.outputs.exists == 'true'
        run: swift test --package-path "packages/${{ matrix.package }}" --parallel

      - name: Report package absent on this ref
        if: steps.package.outputs.exists != 'true'
        run: echo "packages/${{ matrix.package }} is not present on this ref"
